<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tai-H App</title>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      runExportedApp({
        id: "root",
        appEngine: "r",
        relPath: "",
      });
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  </head>
  <body>
    
    <div style="height: 100vh; width: 100vw" id="root">
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-family: 'Courier New', Courier, monospace; background-color: #2b2b2b; color: #a9b7c6; text-align: center; padding: 20px;">
    
    <div style="border: 4px solid #4a4a4a; border-top: 4px solid #9876aa; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <pre style="font-size: 15px; line-height: 1.2; margin-bottom: 25px; color: #cc7832; font-weight: bold;">
  /\_/\  
 ( o.o ) 旦~
  > ^ <
    </pre>

    <h2 style="margin-bottom: 15px; color: #6a8759; letter-spacing: 1px; font-size: 22px;">Tai-H App 系統初始化中...</h2>
    <p style="font-size: 14px; color: #808080; max-width: 500px; line-height: 1.6;">
      小貓貓正在幫您下載 R 語言運算核心與繪圖套件。<br>
      <span style="color: #cc7832;">首次載入約需 1 至 3 分鐘，請耐心等候，請勿關閉網頁。</span><br>
      <span style="font-size: 12px;">(載入完成後，第二次訪問將可瞬間開啟)</span>
    </p>
  </div>
  </div>
    
  </body>
</html>
